---
# Role variables

symantec_av_tmpdir: "/opt/sav"
symantec_av_bin: "/opt/Symantec/symantec_antivirus"
symantec_av_services:
  - symcfgd
  - rtvscand
  - smcd
  - autoprotect

symantec_av_autocompile_ok: false

symantec_av_module_dependencies:
  - "kernel-devel"
  - "kernel-headers"

symantec_av_apmodule_ok_str: "Auto-Protect component installed successfully"
symantec_av_apmodule_error_str: "Build Auto-Protect kernel modules from source code failed with error"
