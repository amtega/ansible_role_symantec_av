---
# Tasks for testing role

- name: Configure vagrant sandbox environment
  hosts: localhost
  roles:
    - role: amtega.vagrant_presets
      vagrant_presets_boxes_json_query: >-
        [? starts_with(name, `centos-6`)
           || starts_with(name, `centos-7`)
           || starts_with(name, `fedora-29`)
           || starts_with(name, `fedora-30`) ]

    - role: amtega.vagrant_sandbox
      vagrant_sandbox_state: started

  tags:
    - sandbox

# - name: Run idempotence test
#   hosts: localhost
#   roles:
#     - role: amtega.vagrant_sandbox
#       vagrant_sandbox_state: started
#   tags:
#     - sandbox

- name: Test SymanteAV role
  hosts: vagrant_sandbox_vms
  roles:
    - role: amtega.packages
      vars:
        packages_os:
          all:
            all:
              unzip: present
          centos:
            all:
              glibc.i686: present
              chkconfig: present
          fedora:
            all:
              glibc.i686: present
              libnsl.i686: present
              chkconfig: present

    - role: amtega.symantec_av
      vars:
        symantec_av_origin: 'files'
        symantec_av_state: "present"
        symantec_av_version_string: "(14.2.4815.1100)"
        symantec_av_archive_rpm: "SEP_14.2.4815.1100_RPM.zip"
        symantec_av_archive_dpkg: "SEP_14.2.4815.1100_DPKG.zip"

  tasks:
    - debug:
        msg: "check installed version with import_role"

    # - import_role:
    #     name: amtega.symantec_av
    #   tags: role::symantec_av::version

    ###
    # - name: "Check status"
    #   command: "{{symantec_av_bin}}/sav info -p"
    #   register: sav_output
    #
    # - name: "SAV status"
    #   debug:
    #     msg: " SAV status: {{ sav_output.stdout_lines}}"
    #     verbosity: 2
    #
    # - set_fact:
    #     symantec_av_version_installed: "{{ sav_output.stdout_lines[0].split(' ')[0] }}"
    #
    # - debug:
    #     msg: "version installed {{ symantec_av_version_installed }}"
    #     verbosity: 2
    - name: "check version"
      include_role:
        name: amtega.symantec_av
      tags: role::symantec_av::version

    - debug:
        msg: "versions: {{symantec_av_versions}}"
      vars:
        symantec_av_versions:
          installed: "{{symantec_av_version_installed_string}}"
          required: "{{symantec_av_version_string}}"

    - assert:
        that:
          - symantec_av_version_installed_string == symantec_av_version_string
        success_msg: "{{symantec_av_version_installed_string}} version installed"
        fail_msg: >-
          "symantec_av_version_installed: {{symantec_av_version_installed_string}} symantec_av_version: {{symantec_av_version_string}}"

    ###
    - name: "get service facts"
      service_facts:

    - assert:
        that:
          - ansible_facts.services[item].state == 'running'
        success_msg: "checked service {{item}}"
      with_items:
          - "{{ symantec_av_services }}"

  tags:
    - idempotence

- name: Cleanup vagrant sandbox
  hosts: localhost
  roles:
    - role: amtega.vagrant_sandbox
      vagrant_sandbox_state: absent
  tags:
    - cleanup
    - sandbox
