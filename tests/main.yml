---
# Tasks for testing role

- name: Configure vagrant sandbox environment
  hosts: localhost
  roles:
    - role: amtega.vagrant_presets
      vagrant_presets_boxes_json_query: >-
        [? starts_with(name, `centos-6`)
           || starts_with(name, `centos-7`)
           || starts_with(name, `fedora-28`)
           || starts_with(name, `fedora-29`)
           || starts_with(name, `fedora-30`) ]

  tags:
    - sandbox

- name: Run idempotence test
  hosts: localhost
  roles:
    - role: amtega.vagrant_sandbox
      vagrant_sandbox_state: started
  tags:
    - sandbox

- name: Test SymanteAV role
  hosts: vagrant_sandbox_vms
  roles:
    - role: amtega.packages
      vars:
        packages_os:
          all:
            all:
              unzip: present

    - role: amtega.symantec_av
      vars:
        symantec_av_state: "present"
        #symantec_av_archive_rpm: "SEP_14.2.4815.1100_RPM.zip"
        #symantec_av_archive_dpkg: "SEP_14.2.4815.1100_DPKG.zip"

  tasks:
    - name: "Check status"
      command: "{{symantec_av_bin}}/sav info -p"
      register: sav_output

    - name: "SAV status"
      debug:
        msg: "{{ sav_output.stdout_lines}}"

    # - name: "get service facts"
    #   service_facts:
    #
    # - name: "check services status"
    #   debug:
    #     msg: "service: {{ ansible_facts.services[item].name }} / status: {{ ansible_facts.services[item].state }}"
    #   with_items:
    #     - "{{ symantec_av_services }}"



    - debug:
        msg: "Symantec AV autoprotect status BAD"
      when: not symantec_av_autocompile_ok

    # - include_tasks: ../tasks/build_modules.yml
    #   when: not symantec_av_autocompile_ok



    # - fail:
    #     msg: "some ClamAV service is not running"
    #   when: >
    #     clamav_freshclam_state  != 'running'
    #     or clamav_scan_state  != 'running'
    # - assert:
    #     that:
    #       - clamav_freshclam_state == 'running'
    #       - clamav_scan_state  == 'running'
  tags:
    - idempotence

- name: Cleanup vagrant sandbox
  hosts: localhost
  roles:
    - role: amtega.vagrant_sandbox
      vagrant_sandbox_state: absent
  tags:
    - cleanup
    - sandbox
